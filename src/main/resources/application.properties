spring.application.name=AuthPractice
server.port=6060

spring.datasource.username=root
spring.datasource.password=root
spring.datasource.url=jdbc:mysql://localhost:3306/salon_db
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=3f9a8b7c2d5e4f1a0b9c8d7e6f3a2b1c0d9e8f7a6b5c4d3e2f1a0b9c8d7e6f3a2b1c0d9e8f7a6b5c4d3e2f1a

jwt.expiration=86400000
  # 24 hours
jwt.refresh-expiration=604800000
  # 7 days

# Logging
logging.level.com.salon=DEBUG
logging.level.org.springframework.security=INFO

# CORS
cors.allowed-origins=http://localhost:6060,http://127.0.0.1:5500
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS