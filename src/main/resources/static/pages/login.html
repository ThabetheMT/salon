<div class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1>Welcome back</h1>
            <p>sign in to your account</p>
        </div>

        <form class="auth-form" id="loginForm" onsubmit="event.preventDefault(); handleLogin()">
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="text" id="loginEmail" placeholder="Email or phone" required>
            </div>

            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="Password" required>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe"> Remember me
                </label>
                <a class="forgot-link" onclick="navigateTo('forgot-password')">Forgot password?</a>
            </div>

            <button type="submit" class="auth-btn" id="loginButton">
                <span>Log in</span>
            </button>

            <div class="auth-footer">
                <p>Don't have an account? <a onclick="navigateTo('signup')">Sign up</a></p>
            </div>
        </form>
    </div>
</div>
