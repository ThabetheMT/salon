<div class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>join the caramel family</p>
        </div>

        <form class="auth-form" id="signupForm" onsubmit="event.preventDefault(); handleSignup()">
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" id="signupName" placeholder="Full name" required>
            </div>

            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="signupEmail" placeholder="Email address" required>
            </div>

            <div class="form-group">
                <i class="fas fa-phone"></i>
                <input type="tel" id="signupPhone" placeholder="Phone number" required>
            </div>

            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="signupPassword" placeholder="Password" required onkeyup="validatePassword()">
            </div>

            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="signupConfirmPassword" placeholder="Confirm password" required onkeyup="validatePasswordMatch()">
            </div>

            <div class="password-requirements" id="passwordRequirements">
                <p id="reqLength" class="invalid"><i class="fas fa-times"></i> At least 8 characters</p>
                <p id="reqNumber" class="invalid"><i class="fas fa-times"></i> At least 1 number</p>
                <p id="reqUpper" class="invalid"><i class="fas fa-times"></i> At least 1 uppercase letter</p>
                <p id="reqMatch" class="invalid"><i class="fas fa-times"></i> Passwords match</p>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="termsCheckbox" required> I agree to the <a href="#" onclick="showTerms()">Terms & Conditions</a>
                </label>
            </div>

            <button type="submit" class="auth-btn" id="signupBtn">
                <span>Create Account</span>
            </button>

            <div class="auth-footer">
                <p>Already have an account? <a onclick="navigateTo('login')">Sign in</a></p>
            </div>
        </form>
    </div>
</div>
