<div class="dashboard-page">
    <div class="container">
        <div class="back-home" onclick="navigateTo('home')">
            <i class="fas fa-arrow-left"></i> Back to Home
        </div>

        <div class="dashboard-header">
            <div class="welcome-badge">
                <h3>Welcome back, <span id="customerName">Loading...</span>! <i class="fas fa-heart" style="color: var(--caramel);"></i></h3>
            </div>
            <div class="membership-card" id="membershipCard">
                <div class="level" id="membershipLevel">Loading...</div>
                <div class="points" id="loyaltyPoints">0</div>
                <div id="nextReward">Loading...</div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="dashboard-card">
                <h3><i class="fas fa-calendar-check"></i> Upcoming Appointments</h3>
                <div id="upcomingAppointments">
                    <div style="text-align: center; padding: 1rem;">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
                <button class="booking-btn" style="margin-top: 1rem; padding: 0.8rem;" onclick="openBookingModal()">Book New</button>
            </div>

            <div class="dashboard-card">
                <h3><i class="fas fa-history"></i> Recent History</h3>
                <div id="appointmentHistory">
                    <div style="text-align: center; padding: 1rem;">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>

            <div class="dashboard-card">
                <h3><i class="fas fa-heart"></i> Favorites</h3>
                <div class="favorites-grid" id="favoritesContainer">
                    <div style="text-align: center; width: 100%; padding: 1rem;">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>

            <div class="dashboard-card">
                <h3><i class="fas fa-gift"></i> Special Offers</h3>
                <div class="offer-slider" id="offersContainer">
                    <div style="text-align: center; padding: 1rem;">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
