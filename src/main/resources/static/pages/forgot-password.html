<div class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1>Forgot Password?</h1>
            <p>we'll send you a reset link</p>
        </div>

        <div id="resetStep1">
            <form class="auth-form" id="forgotPasswordForm" onsubmit="event.preventDefault(); requestPasswordReset()">
                <div class="form-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="resetEmail" placeholder="Enter your email address" required>
                </div>

                <button type="submit" class="auth-btn" id="resetBtn">
                    <span>Send Reset Link</span>
                </button>

                <div class="auth-footer">
                    <p>Remember your password? <a onclick="navigateTo('login')">Sign in</a></p>
                </div>
            </form>
        </div>

        <div id="resetStep2" style="display: none;">
            <div class="success-message" style="text-align: center; padding: 2rem;">
                <i class="fas fa-envelope-open-text" style="font-size: 4rem; color: var(--caramel); margin-bottom: 1rem;"></i>
                <h3 style="margin-bottom: 1rem;">Check Your Email</h3>
                <p style="margin-bottom: 2rem;">We've sent a password reset link to <strong id="sentEmail"></strong></p>
                <button class="auth-btn" onclick="navigateTo('login')">Return to Login</button>
            </div>
        </div>
    </div>
</div>
